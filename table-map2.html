<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SERIOUS PUNCH: TABLE MAP</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans+Thai:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --bg-color: #eeeeee;
        --accent-red: #e4002b;
        --card-black: #242424;
        --text-white: #ffffff;
        --border-dash: #cccccc;
        --pulse-glow: #ffffff;
        --gray-sub: #888888;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background-color: var(--bg-color);
        font-family: "IBM Plex Sans Thai", sans-serif;
        color: var(--card-black);
        min-height: 100vh;
        display: flex;
      }

      /* ─── Sidebar (Desktop) ─── */
      aside {
        width: 90px;
        background: var(--card-black);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 30px 0;
        gap: 35px;
        border-right: 2px solid #333;
        position: fixed;
        top: 0;
        left: 0;
        height: 100vh;
        z-index: 100;
      }

      .nav-icon {
        color: #ffffff;
        cursor: pointer;
        transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        font-size: 0.6rem;
        font-family: "IBM Plex Sans Thai", sans-serif;
        font-weight: 500;
      }
      .nav-icon span {
        color: #ffffff;
      }
      .nav-icon:hover {
        color: #ffffff;
        opacity: 0.7;
        transform: scale(1.1);
      }
      .nav-icon.active {
        color: var(--accent-red) !important;
      }
      .nav-icon.active span {
        color: var(--accent-red) !important;
      }

      /* ─── Main Content ─── */
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 25px;
        margin-left: 90px; /* sidebar width */
        overflow-y: auto;
        min-height: 100vh;
      }

      header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 25px;
        gap: 16px;
        flex-wrap: wrap;
      }

      .logo-area h1 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 3rem;
        line-height: 0.9;
        letter-spacing: 1px;
      }

      .status-summary {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }
      .status-badge {
        background: var(--card-black);
        color: white;
        padding: 12px 20px;
        border-radius: 4px;
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 4px solid var(--accent-red);
        font-size: 0.9rem;
      }

      /* ─── Controls ─── */
      .controls {
        display: flex;
        justify-content: space-between;
        margin-bottom: 20px;
        align-items: center;
        flex-wrap: wrap;
        gap: 10px;
      }

      .tabs {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .tab {
        background: white;
        border: 2px solid var(--card-black);
        padding: 10px 18px;
        font-weight: 700;
        cursor: pointer;
        text-transform: uppercase;
        font-size: 0.85rem;
        transition: 0.2s;
        font-family: "IBM Plex Sans Thai", sans-serif;
      }
      .tab.active {
        background: var(--card-black);
        color: white;
      }
      .tab-date.active {
        background: var(--accent-red);
        border-color: var(--accent-red);
        color: white;
      }

      /* ─── View Toggle ─── */
      .view-toggle {
        display: flex;
        gap: 6px;
        margin-bottom: 16px;
      }
      .view-btn {
        background: white;
        border: 2px solid var(--card-black);
        padding: 8px 14px;
        cursor: pointer;
        font-weight: 700;
        font-family: "IBM Plex Sans Thai", sans-serif;
        font-size: 0.8rem;
        text-transform: uppercase;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: 0.2s;
      }
      .view-btn.active {
        background: var(--card-black);
        color: white;
      }
      .view-btn svg {
        width: 15px;
        height: 15px;
      }

      /* ─── Floor Plan View ─── */
      .floor-plan-wrapper {
        flex: 1;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      .floor-plan {
        background: white;
        position: relative;
        border: 5px solid var(--card-black);
        border-radius: 12px;
        min-width: 700px; /* fixed min-width, scroll on mobile */
        height: 520px;
        background-image: radial-gradient(#e0e0e0 1.5px, transparent 1.5px);
        background-size: 30px 30px;
        box-shadow: 10px 10px 0px rgba(0, 0, 0, 0.05);
      }

      .table {
        position: absolute;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        font-weight: bold;
      }
      .table:hover {
        transform: scale(1.08);
        z-index: 10;
      }

      .shape-square {
        width: 95px;
        height: 95px;
        border-radius: 8px;
      }
      .shape-circle {
        width: 95px;
        height: 95px;
        border-radius: 50%;
      }
      .shape-long {
        width: 190px;
        height: 95px;
        border-radius: 12px;
      }

      .FREE {
        border: 3px dashed var(--border-dash);
        background: rgba(255, 255, 255, 0.9);
        color: #bbb;
      }
      .OCCUPIED {
        background: var(--accent-red);
        color: white;
        border: 3px solid var(--accent-red);
        box-shadow: 0 6px 0px #800018;
      }
      .BILL {
        background: var(--accent-red);
        color: white;
        animation: billPulse 1s infinite alternate;
      }
      .RESERVED {
        background: #3a3a3a;
        color: #aaa;
        border: 3px dashed #555;
      }

      @keyframes billPulse {
        from {
          box-shadow: 0 0 5px var(--accent-red);
        }
        to {
          box-shadow: 0 0 25px var(--pulse-glow);
          border: 3px solid var(--accent-red);
        }
      }

      .table-id {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2rem;
        line-height: 1;
      }
      .table-timer {
        font-size: 0.8rem;
        margin-top: 4px;
        font-weight: 300;
        background: rgba(0, 0, 0, 0.2);
        padding: 2px 6px;
        border-radius: 10px;
      }
      .cap-icon {
        font-size: 0.75rem;
        display: flex;
        align-items: center;
        gap: 4px;
        margin-bottom: 2px;
      }

      /* ─── List View ─── */
      .list-view {
        display: none;
      }
      .table-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 12px;
      }
      .list-card {
        background: white;
        border: 3px solid var(--card-black);
        border-radius: 10px;
        padding: 18px;
        cursor: pointer;
        transition: 0.2s;
        display: flex;
        flex-direction: column;
        gap: 6px;
        position: relative;
        overflow: hidden;
      }
      .list-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: var(--border-dash);
      }
      .list-card.OCCUPIED::before,
      .list-card.BILL::before {
        background: var(--accent-red);
      }
      .list-card.RESERVED::before {
        background: #555;
      }
      .list-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1);
      }
      .list-card.BILL {
        animation: cardPulse 1s infinite alternate;
      }

      @keyframes cardPulse {
        from {
          box-shadow: 0 0 0 rgba(228, 0, 43, 0);
        }
        to {
          box-shadow: 0 0 15px rgba(228, 0, 43, 0.3);
        }
      }

      .list-card-id {
        font-family: "Bebas Neue", sans-serif;
        font-size: 2rem;
        line-height: 1;
        color: var(--card-black);
      }
      .list-card-meta {
        font-size: 0.78rem;
        color: var(--gray-sub);
        display: flex;
        align-items: center;
        gap: 5px;
      }
      .list-card-status {
        display: inline-block;
        font-size: 0.72rem;
        font-weight: 700;
        padding: 3px 10px;
        border-radius: 20px;
        text-transform: uppercase;
        margin-top: 4px;
        align-self: flex-start;
      }
      .status-chip-FREE {
        background: #eee;
        color: #888;
      }
      .status-chip-OCCUPIED {
        background: var(--accent-red);
        color: white;
      }
      .status-chip-BILL {
        background: var(--accent-red);
        color: white;
      }
      .status-chip-RESERVED {
        background: #3a3a3a;
        color: #aaa;
      }
      .list-card-timer {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--accent-red);
      }

      /* ─── Bottom Nav (Mobile) ─── */
      .bottom-nav {
        display: none;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--card-black);
        border-top: 2px solid #333;
        z-index: 100;
        padding: 8px 0;
        justify-content: space-around;
      }
      .bottom-nav .nav-icon {
        color: #ffffff;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 3px;
        font-size: 0.6rem;
      }
      .bottom-nav .nav-icon.active {
        color: var(--accent-red);
      }
      .bottom-nav .nav-icon.active span {
        color: var(--accent-red);
      }
      .bottom-nav .nav-icon svg {
        width: 22px;
        height: 22px;
      }

      /* ─── Modal ─── */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: none;
        justify-content: center;
        align-items: flex-end; /* bottom sheet on mobile */
        z-index: 1000;
        backdrop-filter: blur(4px);
      }
      .modal {
        background: var(--card-black);
        width: 100%;
        max-width: 480px;
        padding: 35px;
        border-radius: 4px 4px 0 0;
        color: white;
        border-top: 10px solid var(--accent-red);
        animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes slideUp {
        from {
          transform: translateY(100%);
        }
        to {
          transform: translateY(0);
        }
      }
      .modal h2 {
        font-family: "Bebas Neue", sans-serif;
        font-size: 3rem;
        margin-bottom: 5px;
      }

      .action-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 25px;
      }
      .btn {
        padding: 18px;
        border: none;
        border-radius: 4px;
        font-weight: 700;
        cursor: pointer;
        font-family: "IBM Plex Sans Thai";
        text-transform: uppercase;
        transition: 0.2s;
        font-size: 0.85rem;
      }
      .btn-red {
        background: var(--accent-red);
        color: white;
      }
      .btn-red:hover {
        background: #ff1a43;
      }
      .btn-dark {
        background: #3a3a3a;
        color: white;
      }
      .btn-green {
        background: #28a745;
        color: white;
      }
      .btn-outline {
        background: transparent;
        border: 1.5px solid #555;
        color: #888;
      }
      .full-width {
        grid-column: span 2;
      }

      /* ─── RESPONSIVE BREAKPOINTS ─── */

      /* Tablet: hide sidebar, show bottom nav */
      @media (max-width: 900px) {
        body {
          flex-direction: column;
        }

        aside {
          display: none;
        }

        main {
          margin-left: 0;
          padding: 16px;
          padding-bottom: 80px; /* space for bottom nav */
        }

        .logo-area h1 {
          font-size: 2.2rem;
        }

        .status-badge {
          padding: 10px 14px;
          font-size: 0.8rem;
          gap: 8px;
        }

        .tab {
          padding: 8px 12px;
          font-size: 0.78rem;
        }

        .bottom-nav {
          display: flex;
        }

        /* JS handles show/hide via switchView() */
      }

      /* Small phones */
      @media (max-width: 480px) {
        main {
          padding: 12px;
          padding-bottom: 80px;
        }

        header {
          gap: 10px;
        }
        .logo-area h1 {
          font-size: 1.9rem;
        }
        .status-summary {
          gap: 8px;
        }
        .status-badge {
          padding: 8px 12px;
          font-size: 0.75rem;
        }

        .tabs {
          gap: 5px;
        }
        .tab {
          padding: 7px 10px;
          font-size: 0.72rem;
        }

        .table-list {
          grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
          gap: 10px;
        }
        .list-card {
          padding: 14px;
        }
        .list-card-id {
          font-size: 1.7rem;
        }

        .modal {
          padding: 24px 20px;
        }
        .modal h2 {
          font-size: 2.5rem;
        }
        .action-grid {
          gap: 8px;
        }
        .btn {
          padding: 15px 10px;
          font-size: 0.78rem;
        }
      }

      /* Always show view toggle */
      .view-toggle {
        display: flex;
      }

      @media (min-width: 769px) {
        .modal-overlay {
          align-items: center;
        }
        .modal {
          border-radius: 4px;
          max-width: 420px;
          width: 420px;
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <!-- Desktop Sidebar -->
    <aside>
      <div class="nav-icon active">
        <i data-lucide="layout-grid"></i><span>แผนผัง</span>
      </div>
      <div class="nav-icon">
        <i data-lucide="clipboard-list"></i><span>ออเดอร์</span>
      </div>
      <div class="nav-icon">
        <i data-lucide="banknote"></i><span>เก็บเงิน</span>
      </div>
      <div class="nav-icon">
        <i data-lucide="history"></i><span>ประวัติออเดอร์</span>
      </div>
      <div class="nav-icon">
        <i data-lucide="settings"></i><span>ตั้งค่า</span>
      </div>
    </aside>

    <main>
      <header>
        <div class="logo-area">
          <h1>
            SERIOUS PUNCH:<br /><span style="color: var(--accent-red)"
              >TABLE MAP</span
            >
          </h1>
        </div>
        <div class="status-summary">
          <div class="status-badge">FREE: <span id="count-free">0</span></div>
          <div class="status-badge" style="border-color: #555">
            OCCUPIED: <span id="count-occ">0</span>
          </div>
        </div>
      </header>

      <div class="controls">
        <div class="tabs" id="filter-tabs">
          <div class="tab active" data-filter="ALL" onclick="setFilter(this)">
            All
          </div>
          <div class="tab" data-filter="FREE" onclick="setFilter(this)">
            Available
          </div>
          <div class="tab" data-filter="OCCUPIED" onclick="setFilter(this)">
            Occupied
          </div>
          <div class="tab" data-filter="BILL" onclick="setFilter(this)">
            Bill
          </div>
          <div class="tab" data-filter="RESERVED" onclick="setFilter(this)">
            Reserved
          </div>
        </div>
        <div class="tabs">
          <button class="tab">
            <i data-lucide="chevron-left" style="width: 16px"></i>
          </button>
          <div class="tab tab-date active">9 APR</div>
          <button class="tab">
            <i data-lucide="chevron-right" style="width: 16px"></i>
          </button>
        </div>
      </div>

      <!-- View Toggle (Desktop only) -->
      <div class="view-toggle">
        <button
          class="view-btn active"
          id="btn-floor"
          onclick="switchView('floor')"
        >
          <i data-lucide="layout-grid"></i> Floor Plan
        </button>
        <button class="view-btn" id="btn-list" onclick="switchView('list')">
          <i data-lucide="rows-3"></i> List
        </button>
      </div>

      <!-- Floor Plan View -->
      <div id="view-floor">
        <div class="floor-plan-wrapper">
          <div class="floor-plan" id="floor-plan"></div>
        </div>
        <p
          style="
            font-size: 0.72rem;
            color: var(--gray-sub);
            margin-top: 8px;
            text-align: center;
          "
        >
          ← เลื่อนซ้าย-ขวาเพื่อดูทั้ง floor
        </p>
      </div>

      <!-- List View -->
      <div class="list-view" id="view-list">
        <div class="table-list" id="table-list"></div>
      </div>
    </main>

    <!-- Mobile Bottom Nav -->
    <nav class="bottom-nav">
      <div class="nav-icon active">
        <i data-lucide="layout-grid"></i>
        <span>แผนผัง</span>
      </div>
      <div class="nav-icon">
        <i data-lucide="clipboard-list"></i>
        <span>ออเดอร์</span>
      </div>
      <div class="nav-icon">
        <i data-lucide="banknote"></i>
        <span>เก็บเงิน</span>
      </div>
      <div class="nav-icon">
        <i data-lucide="history"></i>
        <span>ประวัติ</span>
      </div>
      <div class="nav-icon">
        <i data-lucide="settings"></i>
        <span>ตั้งค่า</span>
      </div>
    </nav>

    <!-- Modal -->
    <div
      class="modal-overlay"
      id="modal-overlay"
      onclick="handleOverlayClick(event)"
    >
      <div class="modal">
        <h2 id="modal-table-id">TABLE T-01</h2>
        <p id="modal-meta" style="color: var(--gray-sub)">
          Capacity: 4 Seats | Status: Occupied
        </p>
        <div class="action-grid" id="modal-actions"></div>
        <button
          class="btn btn-outline full-width"
          style="margin-top: 15px"
          onclick="closeModal()"
        >
          CLOSE
        </button>
      </div>
    </div>

    <script>
      let tables = [
        {
          id: "T-01",
          shape: "square",
          cap: 4,
          status: "FREE",
          startTime: null,
          x: 8,
          y: 12,
        },
        {
          id: "T-02",
          shape: "square",
          cap: 4,
          status: "OCCUPIED",
          startTime: Date.now() - 1200000,
          x: 8,
          y: 38,
        },
        {
          id: "T-03",
          shape: "square",
          cap: 4,
          status: "FREE",
          startTime: null,
          x: 8,
          y: 64,
        },
        {
          id: "T-04",
          shape: "square",
          cap: 2,
          status: "FREE",
          startTime: null,
          x: 28,
          y: 38,
        },
        {
          id: "VIP-1",
          shape: "long",
          cap: 8,
          status: "BILL",
          startTime: Date.now() - 3600000,
          x: 42,
          y: 12,
        },
        {
          id: "T-05",
          shape: "long",
          cap: 6,
          status: "FREE",
          startTime: null,
          x: 42,
          y: 64,
        },
        {
          id: "B-01",
          shape: "circle",
          cap: 2,
          status: "OCCUPIED",
          startTime: Date.now() - 500000,
          x: 72,
          y: 18,
        },
        {
          id: "B-02",
          shape: "circle",
          cap: 2,
          status: "FREE",
          startTime: null,
          x: 84,
          y: 35,
        },
        {
          id: "B-03",
          shape: "circle",
          cap: 2,
          status: "FREE",
          startTime: null,
          x: 72,
          y: 52,
        },
        {
          id: "B-04",
          shape: "circle",
          cap: 2,
          status: "OCCUPIED",
          startTime: Date.now() - 100000,
          x: 84,
          y: 69,
        },
      ];

      let currentView = window.innerWidth <= 768 ? "list" : "floor";
      let currentFilter = "ALL";

      const statusLabel = {
        FREE: "ว่าง",
        OCCUPIED: "มีลูกค้า",
        BILL: "รอชำระ",
        RESERVED: "จอง",
      };
      const shapeLabel = {
        long: "โต๊ะยาว",
        circle: "โต๊ะกลม",
        square: "โต๊ะสี่เหลี่ยม",
      };

      function setFilter(el) {
        currentFilter = el.dataset.filter;
        document
          .querySelectorAll("#filter-tabs .tab")
          .forEach((t) => t.classList.remove("active"));
        el.classList.add("active");
        renderTables();
      }

      function switchView(view) {
        currentView = view;
        document.getElementById("view-floor").style.display =
          view === "floor" ? "block" : "none";
        document.getElementById("view-list").style.display =
          view === "list" ? "block" : "none";
        document
          .getElementById("btn-floor")
          .classList.toggle("active", view === "floor");
        document
          .getElementById("btn-list")
          .classList.toggle("active", view === "list");
      }

      function formatTime(startTime) {
        const diff = Date.now() - startTime;
        const mins = Math.floor(diff / 60000);
        const secs = Math.floor((diff % 60000) / 1000);
        return `${mins}:${secs < 10 ? "0" + secs : secs}m`;
      }

      function renderTables() {
        const floorPlan = document.getElementById("floor-plan");
        const tableList = document.getElementById("table-list");
        floorPlan.innerHTML = "";
        tableList.innerHTML = "";
        let freeCount = 0,
          occCount = 0;

        const filtered =
          currentFilter === "ALL"
            ? tables
            : tables.filter((t) => t.status === currentFilter);

        tables.forEach((t) => (t.status === "FREE" ? freeCount++ : occCount++));
        document.getElementById("count-free").innerText = freeCount;
        document.getElementById("count-occ").innerText = occCount;

        filtered.forEach((table) => {
          // --- Floor Plan Card ---
          const div = document.createElement("div");
          div.className = `table shape-${table.shape} ${table.status}`;
          div.style.left = `${table.x}%`;
          div.style.top = `${table.y}%`;
          div.innerHTML = `
            <div class="cap-icon"><i data-lucide="users" style="width:12px;height:12px"></i> ${table.cap}</div>
            <div class="table-id">${table.id}</div>
            ${table.startTime ? `<div class="table-timer" id="timer-fp-${table.id}">${formatTime(table.startTime)}</div>` : ""}
          `;
          div.onclick = () => openModal(table.id);
          floorPlan.appendChild(div);

          // --- List Card ---
          const card = document.createElement("div");
          card.className = `list-card ${table.status}`;
          card.innerHTML = `
            <div class="list-card-id">${table.id}</div>
            <div class="list-card-meta"><i data-lucide="users" style="width:13px;height:13px"></i> ${table.cap} ที่นั่ง · ${shapeLabel[table.shape]}</div>
            <div class="list-card-status status-chip-${table.status}">${statusLabel[table.status]}</div>
            ${table.startTime ? `<div class="list-card-timer" id="timer-list-${table.id}">⏱ ${formatTime(table.startTime)}</div>` : ""}
          `;
          card.onclick = () => openModal(table.id);
          tableList.appendChild(card);
        });

        lucide.createIcons();
      }

      // Tick timers every second
      setInterval(() => {
        tables.forEach((table) => {
          if (!table.startTime) return;
          const formatted = formatTime(table.startTime);
          const fpTimer = document.getElementById(`timer-fp-${table.id}`);
          const listTimer = document.getElementById(`timer-list-${table.id}`);
          if (fpTimer) fpTimer.innerText = formatted;
          if (listTimer) listTimer.innerText = `⏱ ${formatted}`;
        });
      }, 1000);

      function openModal(id) {
        const table = tables.find((t) => t.id === id);
        document.getElementById("modal-table-id").innerText =
          `TABLE ${table.id}`;
        document.getElementById("modal-meta").innerText =
          `${table.cap} ที่นั่ง · ${statusLabel[table.status]}`;

        let actions = "";
        if (table.status === "FREE") {
          actions = `
            <button class="btn btn-red full-width" onclick="updateStatus('${id}','OCCUPIED')">OPEN TABLE / WALK-IN</button>
            <button class="btn btn-dark full-width" onclick="updateStatus('${id}','RESERVED')" style="margin-top:0">RESERVE TABLE</button>`;
        } else if (table.status === "RESERVED") {
          actions = `
            <button class="btn btn-red full-width" onclick="updateStatus('${id}','OCCUPIED')">CHECK IN / SEAT NOW</button>
            <button class="btn btn-outline full-width" onclick="updateStatus('${id}','FREE')">CANCEL RESERVATION</button>`;
        } else {
          actions = `
            <button class="btn btn-red" onclick="alert('Going to Order Screen...')">ADD ORDER</button>
            <button class="btn btn-dark" onclick="updateStatus('${id}','BILL')">PRINT BILL</button>
            <button class="btn btn-green" onclick="updateStatus('${id}','FREE')">CONFIRM PAYMENT</button>
            <button class="btn btn-outline" onclick="updateStatus('${id}','FREE')">VOID TABLE</button>`;
        }

        document.getElementById("modal-actions").innerHTML = actions;
        document.getElementById("modal-overlay").style.display = "flex";
        lucide.createIcons();
      }

      function closeModal() {
        document.getElementById("modal-overlay").style.display = "none";
      }

      function handleOverlayClick(e) {
        if (e.target === document.getElementById("modal-overlay")) closeModal();
      }

      function updateStatus(id, newStatus) {
        const table = tables.find((t) => t.id === id);
        table.status = newStatus;
        table.startTime =
          newStatus === "OCCUPIED"
            ? Date.now()
            : newStatus === "FREE"
              ? null
              : table.startTime;
        renderTables();
        closeModal();
      }

      // Init
      renderTables();
      switchView(currentView);

      // Auto-switch view on resize
      window.addEventListener("resize", () => {
        if (window.innerWidth <= 768 && currentView === "floor") {
          switchView("list");
        }
      });
    </script>
  </body>
</html>
