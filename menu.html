<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crispy Co. | Serious Punch Mode</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Sans+Thai:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#242424",
              secondary: "#E4002B",
              accent: "#DC5F00",
              neutral: "#eeeeee",
            },
          },
        },
      };
    </script>

    <style>
      :root {
        --red: #e4002b;
        --black: #242424;
        --bg: #eeeeee;
        --radius: 12px;
      }
      body {
        font-family: "IBM Plex Sans Thai", sans-serif;
        background: var(--bg);
        color: var(--black);
      }
      h1,
      h2,
      h3,
      .bebas {
        font-family: "Bebas Neue", sans-serif;
        letter-spacing: 1px;
      }

      /* --- PROMO PANEL --- */
      .promo-panel {
        position: relative;
        width: 100%;
        height: 400px;
        background: var(--black);
        overflow: hidden;
      }
      @media (min-width: 768px) {
        .promo-panel {
          width: 420px;
          flex-shrink: 0;
          position: sticky;
          top: 72px;
          height: calc(100vh - 72px);
        }
      }
      .promo-slide {
        position: absolute;
        inset: 0;
        opacity: 0;
        transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        pointer-events: none;
      }
      .promo-slide.active {
        opacity: 1;
        pointer-events: auto;
      }
      .slide-img-container {
        position: absolute;
        inset: 0;
        z-index: 1;
      }
      .slide-img-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .slide-img-container::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(0, 0, 0, 0.95) 5%,
          rgba(0, 0, 0, 0.5) 40%,
          transparent 100%
        );
      }
      .slide-content {
        position: relative;
        z-index: 2;
        padding: 40px 30px 60px 30px;
        color: white;
      }
      .slide-tag {
        color: var(--red);
        font-weight: 800;
        font-size: 14px;
        letter-spacing: 3px;
        text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
      }
      .slide-title {
        font-size: 3.5rem;
        line-height: 0.9;
        margin: 10px 0;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
      }
      .slide-price {
        font-size: 2.5rem;
        color: #fff;
        margin-bottom: 15px;
      }

      .promo-controls {
        position: absolute;
        bottom: 20px;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: center;
        gap: 12px;
        z-index: 10;
      }
      .promo-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.4);
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .promo-dot.active {
        background: var(--red);
        transform: scale(1.3);
      }

      /* --- MENU GRID --- */
      .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 25px;
      }
      .menu-card {
        background: #fff;
        border-radius: var(--radius);
        border: 2px solid transparent;
        transition: 0.3s;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }
      .menu-card:hover {
        border-color: var(--black);
        transform: translateY(-5px);
        box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.08);
      }
      .menu-img-box {
        height: 180px;
        background: #f0f0f0;
        position: relative;
        overflow: hidden;
      }
      .menu-img-box img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.5s;
      }
      .menu-card:hover .menu-img-box img {
        transform: scale(1.05);
      }

      .add-btn {
        background: var(--red);
        color: white;
        padding: 8px 12px;
        border-radius: 6px;
        font-weight: bold;
        transition: 0.2s;
      }
      .add-btn:hover {
        background: #000;
        transform: scale(1.05);
      }

      /* สถานะ Sold Out */
      .sold-out-img {
        filter: grayscale(100%) opacity(50%);
      }
      .sold-out-btn {
        background: #e0e0e0;
        color: #888;
        padding: 8px 12px;
        border-radius: 6px;
        font-weight: bold;
        cursor: not-allowed;
      }

      /* Tabs */
      .tab {
        transition: all 0.2s ease-in-out;
      }
      .tab:hover:not(.active) {
        background: #e0e0e0;
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background: var(--black);
        color: white;
        padding: 15px 25px;
        border-radius: 8px;
        transform: translateY(100px);
        opacity: 0;
        transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        z-index: 1000;
        border-left: 5px solid var(--red);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      }
      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      /* Mini Cart Custom Scrollbar */
      #cartItemsList::-webkit-scrollbar {
        width: 6px;
      }
      #cartItemsList::-webkit-scrollbar-track {
        background: transparent;
      }
      #cartItemsList::-webkit-scrollbar-thumb {
        background: #ccc;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <header class="bg-primary text-neutral shadow-lg sticky top-0 z-40">
      <nav
        class="container mx-auto px-4 py-4 flex justify-between items-center"
      >
        <div class="flex items-center">
          <a
            href="#"
            class="text-3xl font-bold text-white bebas flex items-center gap-2"
          >
            <i data-lucide="hand-fist" class="h-8 w-8 text-secondary"></i>
            <span>SERIOUS PUNCH</span>
          </a>
        </div>
        <div class="hidden md:flex space-x-8 items-center">
          <ul class="flex space-x-6">
            <li>
              <a href="index.html" class="hover:text-secondary transition"
                >Home</a
              >
            </li>
            <li>
              <a href="menu.html" class="text-secondary font-bold">Menu</a>
            </li>
            <li>
              <a
                href="custom-order.html"
                class="hover:text-secondary transition"
                >Order</a
              >
            </li>
          </ul>

          <button
            id="cart-wrapper"
            class="flex items-center gap-4 bg-[#333] hover:bg-secondary px-4 py-2 rounded-full transition-all duration-300 cursor-pointer"
            onclick="toggleCart()"
          >
            <i data-lucide="shopping-cart" class="w-5 h-5 text-white"></i>
            <span id="cartCountDesktop" class="font-bold">0</span>
          </button>

          <button
            class="bg-secondary hover:bg-white hover:text-black text-neutral px-6 py-2 rounded-full font-semibold transition"
          >
            <a href="login.html">Sign In</a>
          </button>
        </div>
      </nav>
    </header>

    <div class="flex flex-col md:flex-row min-h-screen relative">
      <aside class="promo-panel" id="promoContainer"></aside>

      <main class="flex-1 p-6 md:p-12 pb-32 md:pb-12">
        <div class="mb-10">
          <span
            class="text-secondary font-black tracking-widest text-sm uppercase"
            >Explore Flavors</span
          >
          <h2 class="text-5xl font-black bebas mt-2 text-primary">
            SERIOUS SELECTIONS
          </h2>
        </div>

        <div
          class="flex gap-3 mb-8 overflow-x-auto pb-2 scrollbar-hide"
          id="catTabs"
        >
          <button
            class="tab active bg-primary text-white px-6 py-2 rounded-md font-bold"
            onclick="filterMenu('all', this)"
          >
            ALL
          </button>
          <button
            class="tab border-2 border-primary text-primary px-6 py-2 rounded-md font-bold hover:bg-gray-100"
            onclick="filterMenu('bucket', this)"
          >
            BUCKETS
          </button>
          <button
            class="tab border-2 border-primary text-primary px-6 py-2 rounded-md font-bold hover:bg-gray-100"
            onclick="filterMenu('sandwich', this)"
          >
            SANDWICHES
          </button>
          <button
            class="tab border-2 border-primary text-primary px-6 py-2 rounded-md font-bold hover:bg-gray-100"
            onclick="filterMenu('side', this)"
          >
            SIDES
          </button>
          <button
            class="tab border-2 border-primary text-primary px-6 py-2 rounded-md font-bold hover:bg-gray-100"
            onclick="filterMenu('desserts', this)"
          >
            DESSERTS
          </button>
        </div>

        <div class="menu-grid" id="menuGrid"></div>
      </main>
    </div>

    <div
      class="md:hidden fixed bottom-0 left-0 right-0 bg-primary p-4 flex justify-between items-center text-white z-40 border-t-4 border-secondary cursor-pointer"
      onclick="toggleCart()"
    >
      <div>
        <div class="text-xs opacity-60 uppercase font-bold" id="mobCartCount">
          0 Items
        </div>
        <div class="text-xl font-black text-secondary" id="mobCartTotal">
          ฿0.-
        </div>
      </div>
      <button
        class="bg-secondary px-8 py-3 rounded-full font-black text-sm bebas shadow-lg hover:bg-white hover:text-black transition flex items-center"
      >
        VIEW CART <i data-lucide="arrow-right" class="w-4 h-4 ml-2"></i>
      </button>
    </div>

    <div
      id="cartOverlay"
      class="fixed inset-0 bg-black/60 z-50 hidden transition-opacity opacity-0"
      onclick="toggleCart()"
    ></div>

    <div
      id="cartSidebar"
      class="fixed top-0 right-0 h-full w-full md:w-[400px] bg-white z-50 transform translate-x-full transition-transform duration-300 flex flex-col shadow-2xl"
    >
      <div class="p-5 bg-primary text-white flex justify-between items-center">
        <h2
          class="text-2xl font-bold bebas tracking-widest flex items-center gap-2"
        >
          <i data-lucide="shopping-bag" class="w-6 h-6 text-secondary"></i> YOUR
          CART
        </h2>
        <button onclick="toggleCart()" class="hover:text-secondary transition">
          <i data-lucide="x" class="w-6 h-6"></i>
        </button>
      </div>

      <div
        id="cartItemsList"
        class="flex-1 overflow-y-auto p-5 flex flex-col gap-4"
      ></div>

      <div class="p-5 border-t border-gray-200 bg-gray-50">
        <div
          class="flex justify-between items-center font-bold text-lg mb-4 text-primary"
        >
          <span>Subtotal</span>
          <span
            id="miniCartTotal"
            class="text-3xl text-secondary bebas tracking-wide"
            >฿0.-</span
          >
        </div>
        <button
          class="w-full bg-secondary text-white font-black bebas text-2xl py-4 rounded-lg shadow-[0_6px_0_#800018] hover:translate-y-[4px] hover:shadow-[0_2px_0_#800018] transition"
          onclick="
            alert('ไปหน้า Checkout เลือกว่าจะเพิ่ม Topping หรือกรอกที่อยู่')
          "
        >
          PROCEED TO CHECKOUT
        </button>
      </div>
    </div>

    <div class="toast flex items-center gap-3" id="toast">
      <i data-lucide="check-circle" class="w-5 h-5 text-secondary"></i>
      <span id="toast-text">Item added to cart!</span>
    </div>

    <script>
      const PROMOS = [
        {
          tag: "LIMITED TIME",
          title: "SMILE BUCKET",
          price: "฿199.-",
          img: "../images/pro-1.png",
        },
        {
          tag: "HOT DROP",
          title: "ZABB TEAM BOX",
          price: "฿149.-",
          img: "../images/pro-2.png",
        },
        {
          tag: "SHARING",
          title: "CHICK N' SHARE",
          price: "฿99.-",
          img: "../images/pro-3.png",
        },
        {
          tag: "NEW",
          title: "CHICKSKATE",
          price: "฿199.-",
          img: "../images/pro-4.png",
        },
      ];

      const MENU = [
        {
          id: 1,
          name: "Signature 8pc Bucket",
          price: 299,
          cat: "bucket",
          img: "../images/menu-profile-1.png",
          desc: "Classic Original Recipe chicken.",
        },
        {
          id: 2,
          name: "Party Pack 20pc",
          price: 119,
          cat: "bucket",
          img: "../images/menu-profile-2.png",
          desc: "Extra spicy bucket",
        },
        {
          id: 3,
          name: "Zabb Team Box",
          price: 149,
          cat: "bucket",
          img: "../images/menu-profile-3.png",
          desc: "Wingz Zabb + nuggets combo.",
        },
        {
          id: 4,
          name: "Spicy Chicken Sandwich",
          price: 89,
          cat: "sandwich",
          img: "../images/menu-profile-4.png",
          desc: "Crispy, spicy, and juicy",
        },
        {
          id: 5,
          name: "Classic Sandwich",
          price: 69,
          cat: "sandwich",
          img: "../images/menu-profile-5.png",
          desc: "Original crispy chicken",
        },
        {
          id: 6,
          name: "Zinger Double",
          price: 199,
          cat: "sandwich",
          img: "../images/menu-profile-6.png",
          desc: "Double patty, double flavor",
        },
        {
          id: 7,
          name: "Golden Fries (L)",
          price: 49,
          cat: "side",
          img: "../images/menu-profile-7.png",
          desc: "Golden crispy fries",
        },
        {
          id: 8,
          name: "Coleslaw",
          price: 39,
          cat: "side",
          img: "../images/menu-profile-8.png",
          desc: "Creamy classic slaw",
        },
        // ** ตัวอย่างสินค้าหมด (Sold Out) **
        {
          id: 9,
          name: "Mac & Cheese",
          price: 49,
          cat: "side",
          img: "../images/menu-profile-9.png",
          desc: "Creamy, cheesey goodness",
          soldOut: true,
        },
        {
          id: 10,
          name: "Chocolate Cupcake",
          price: 45,
          cat: "desserts",
          img: "../images/menu-profile-10.png",
          desc: "Rich chocolate treat",
        },
        {
          id: 11,
          name: "Soft serve",
          price: 39,
          cat: "desserts",
          img: "../images/menu-profile-11.png",
          desc: "Vanilla swirl",
        },
      ];

      // --- ระบบ Cart ดึงจาก LocalStorage (ถ้ามี) ---
      // เก็บโครงสร้างเป็น { id: 1, qty: 2 } เพื่อให้บริหารจัดการจำนวนง่ายขึ้น
      let cart = JSON.parse(localStorage.getItem("crispyCart")) || [];

      let currentSlide = 0;
      let slideInterval;

      // --- ฟังก์ชันบันทึกตะกร้า ---
      function saveCart() {
        localStorage.setItem("crispyCart", JSON.stringify(cart));
        updateUI();
      }

      function renderPromos() {
        // (ส่วนนี้โค้ดเดิมเหมือนที่เคยทำ)
        const container = document.getElementById("promoContainer");
        let slidesHTML = PROMOS.map(
          (p, i) => `
          <div class="promo-slide ${i === 0 ? "active" : ""}" id="slide-${i}">
            <div class="slide-img-container"><img src="${p.img}" alt="${p.title}"></div>
            <div class="slide-content">
              <span class="slide-tag bebas">${p.tag}</span>
              <h2 class="slide-title bebas">${p.title}</h2>
              <div class="slide-price bebas">${p.price}</div>
              <button class="bg-secondary text-white px-8 py-3 rounded-md font-bold bebas text-xl hover:bg-white hover:text-black transition shadow-lg" 
                      onclick="addToCartFromPromo('${p.title}')">
                ORDER NOW
              </button>
            </div>
          </div>
        `,
        ).join("");

        let dotsHTML =
          `<div class="promo-controls">` +
          PROMOS.map(
            (_, i) =>
              `<div class="promo-dot ${i === 0 ? "active" : ""}" onclick="goToSlide(${i})" id="dot-${i}"></div>`,
          ).join("") +
          `</div>`;
        container.innerHTML = slidesHTML + dotsHTML;
      }

      function goToSlide(index) {
        clearInterval(slideInterval);
        document
          .getElementById(`slide-${currentSlide}`)
          .classList.remove("active");
        document
          .getElementById(`dot-${currentSlide}`)
          .classList.remove("active");
        currentSlide = index;
        document
          .getElementById(`slide-${currentSlide}`)
          .classList.add("active");
        document.getElementById(`dot-${currentSlide}`).classList.add("active");
        slideInterval = setInterval(nextSlide, 5000);
      }

      function nextSlide() {
        goToSlide((currentSlide + 1) % PROMOS.length);
      }

      // --- RENDER MENU & SOLD OUT LOGIC ---
      function renderMenu(filter = "all") {
        const grid = document.getElementById("menuGrid");
        const items =
          filter === "all" ? MENU : MENU.filter((m) => m.cat === filter);

        grid.innerHTML = items
          .map((m) => {
            // ตรวจสอบว่าเมนูนี้ Sold Out หรือไม่
            const isSoldOut = m.soldOut === true;

            // กำหนดปุ่มและเอฟเฟกต์ภาพตามสถานะ
            const imgClass = isSoldOut ? "sold-out-img" : "";
            const buttonHtml = isSoldOut
              ? `<button class="sold-out-btn" disabled>SOLD OUT</button>`
              : `<button class="add-btn flex items-center justify-center gap-1" onclick="addToCart(${m.id})"><i data-lucide="plus" class="w-4 h-4"></i> ADD</button>`;

            return `
          <div class="menu-card flex flex-col justify-between h-full">
            <div>
              <div class="menu-img-box"><img src="${m.img}" alt="${m.name}" loading="lazy" class="${imgClass}"></div>
              <div class="p-5 pb-2">
                <h3 class="font-bold text-lg mb-1 leading-tight text-primary">${m.name}</h3>
                <p class="text-xs text-gray-500 line-clamp-2">${m.desc}</p>
              </div>
            </div>
            <div class="p-5 pt-0 mt-auto flex justify-between items-end">
              <span class="text-2xl font-black text-secondary bebas tracking-wide">฿${m.price}</span>
              ${buttonHtml}
            </div>
          </div>
        `;
          })
          .join("");
        lucide.createIcons();
      }

      function filterMenu(cat, btn) {
        document.querySelectorAll("#catTabs button").forEach((b) => {
          b.classList.remove("bg-primary", "text-white");
          b.classList.add("border-primary", "text-primary");
        });
        btn.classList.remove("border-primary", "text-primary");
        btn.classList.add("bg-primary", "text-white");
        renderMenu(cat);
      }

      // --- CART LOGIC ---
      function addToCart(id) {
        const item = MENU.find((m) => m.id === id);
        if (!item || item.soldOut) return;

        // เช็คว่ามีเมนูนี้ในตะกร้าหรือยัง
        const existingItem = cart.find((c) => c.id === id);
        if (existingItem) {
          existingItem.qty += 1; // มีแล้ว บวกลบจำนวนเพิ่ม
        } else {
          cart.push({ id: id, qty: 1 }); // ยังไม่มี สร้างใหม่
        }

        saveCart(); // บันทึกลง LocalStorage
        showToast(item.name);
      }

      // ฟังก์ชันสำหรับแบนเนอร์โปรโมชั่น (แบนเนอร์ไม่มี id เลยอิงจากชื่อไปก่อน)
      function addToCartFromPromo(title) {
        alert("ระบบโปรโมชั่นคอมโบเซตจะมาในเฟสถัดไปครับ!");
      }

      // ฟังก์ชันกดปุ่ม + / - หรือลบใน Mini Cart
      function updateQty(id, delta) {
        const itemIndex = cart.findIndex((c) => c.id === id);
        if (itemIndex > -1) {
          cart[itemIndex].qty += delta;
          if (cart[itemIndex].qty <= 0) {
            cart.splice(itemIndex, 1); // ถ้าลดจนเหลือ 0 ให้ลบทิ้ง
          }
          saveCart();
        }
      }

      function showToast(name) {
        const toast = document.getElementById("toast");
        document.getElementById("toast-text").innerText = `Added: ${name}`;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2500);

        const cartWrapper = document.getElementById("cart-wrapper");
        cartWrapper.classList.add("scale-110", "bg-secondary");
        setTimeout(
          () => cartWrapper.classList.remove("scale-110", "bg-secondary"),
          300,
        );
      }

      // --- UI UPDATES (อัปเดตทั้งบนจอและใน Mini Cart) ---
      function updateUI() {
        let totalItems = 0;
        let totalPrice = 0;
        const cartListHtml = document.getElementById("cartItemsList");
        let htmlContent = "";

        if (cart.length === 0) {
          htmlContent = `
            <div class="text-center text-gray-400 mt-16 flex flex-col items-center">
              <i data-lucide="shopping-bag" class="w-16 h-16 mb-4 opacity-30"></i>
              <p>ตะกร้าของคุณยังว่างเปล่า</p>
            </div>`;
        }

        // จับคู่ข้อมูลตะกร้า (ที่เก็บแค่ ID) กับ ข้อมูลเมนูจริงๆ เพื่อดึงชื่อและราคา
        cart.forEach((cartItem) => {
          const menuItem = MENU.find((m) => m.id === cartItem.id);
          if (menuItem) {
            totalItems += cartItem.qty;
            const itemTotal = menuItem.price * cartItem.qty;
            totalPrice += itemTotal;

            // วาด UI แต่ละชิ้นในตะกร้า
            htmlContent += `
              <div class="flex items-center gap-4 bg-white p-3 rounded-lg border border-gray-100 shadow-sm">
                <img src="${menuItem.img}" class="w-16 h-16 object-cover rounded-md bg-gray-100">
                <div class="flex-1">
                  <h4 class="font-bold text-primary text-sm leading-tight">${menuItem.name}</h4>
                  <div class="text-secondary font-black bebas text-lg">฿${itemTotal}</div>
                </div>
                
                <div class="flex items-center gap-3 border border-gray-200 rounded-md px-1 py-1 bg-gray-50">
                  <button onclick="updateQty(${menuItem.id}, -1)" class="w-6 h-6 flex items-center justify-center text-gray-500 hover:text-black hover:bg-gray-200 rounded transition"><i data-lucide="minus" class="w-4 h-4"></i></button>
                  <span class="w-4 text-center font-bold text-primary text-sm">${cartItem.qty}</span>
                  <button onclick="updateQty(${menuItem.id}, 1)" class="w-6 h-6 flex items-center justify-center text-gray-500 hover:text-black hover:bg-gray-200 rounded transition"><i data-lucide="plus" class="w-4 h-4"></i></button>
                </div>
              </div>
            `;
          }
        });

        // ยัด HTML ใส่ตะกร้า
        cartListHtml.innerHTML = htmlContent;

        // อัปเดตตัวเลขตามจุดต่างๆ
        document.getElementById("cartCountDesktop").innerText = totalItems;
        document.getElementById("mobCartCount").innerText =
          `${totalItems} Items`;
        document.getElementById("mobCartTotal").innerText = `฿${totalPrice}.-`;
        document.getElementById("miniCartTotal").innerText =
          `฿${totalPrice.toLocaleString()}.-`;

        lucide.createIcons(); // วาดไอคอนใหม่
      }

      // --- เปิด/ปิด ตะกร้าด้านข้าง ---
      function toggleCart() {
        const sidebar = document.getElementById("cartSidebar");
        const overlay = document.getElementById("cartOverlay");

        if (sidebar.classList.contains("translate-x-full")) {
          // เปิดตะกร้า
          overlay.classList.remove("hidden");
          // ใช้ setTimeout เพื่อให้เบราว์เซอร์จัดการคลาส display hidden ก่อนเล่น transition
          setTimeout(() => {
            overlay.classList.remove("opacity-0");
            sidebar.classList.remove("translate-x-full");
          }, 10);
        } else {
          // ปิดตะกร้า
          sidebar.classList.add("translate-x-full");
          overlay.classList.add("opacity-0");
          setTimeout(() => {
            overlay.classList.add("hidden");
          }, 300); // รอ transition 0.3s จบก่อนซ่อน
        }
      }

      // --- INIT ---
      window.onload = () => {
        renderPromos();
        renderMenu();
        updateUI(); // โหลดข้อมูลตะกร้าจาก LocalStorage ทันทีที่เปิดหน้า
        slideInterval = setInterval(nextSlide, 5000);
        lucide.createIcons();
      };
    </script>
  </body>
</html>
