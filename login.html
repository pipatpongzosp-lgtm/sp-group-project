<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Login Page</title>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#000000',
                        secondary: '#CF0A0A',
                        accent: '#DC5F00',
                        neutral: '#EEEEEE',
                    }
                }
            }
        }
    </script>

     <style type="text/tailwindcss">
         @layer components{
          .input__card{   @apply flex flex-col text-[1vw] font-bold ;
          }
         
         .btn{
              @apply w-[25%] text-[1vw] bg-secondary hover:bg-accent text-neutral px-6 py-2 rounded-full font-semibold transition duration-300;
         }
         h1{
            @apply text-[2vw] font-extrabold;
         }
         .form-card{
            @apply flex flex-col bg-neutral justify-center items-center w-[60vw] h-[44vw] gap-3.5  m-2;
         }
          .form-card a{   @apply text-[1vw] font-normal}
         .container-form{
             @apply flex flex-col  w-full bg-accent justify-center items-center ;
         }
        }
    </style>
    <script>
        function showLogin(){
            document.getElementById("login").style.display="flex";
            document.getElementById("register").style.display="none";
        }
        function showRegister(){
            document.getElementById("register").style.display="flex";
             document.getElementById("login").style.display="none";
        }
    </script>


</head>
<body>


<header class="bg-primary text-neutral shadow-lg">
        <nav class="container mx-auto px-4 py-4 flex justify-between items-center">
            <!-- Logo -->
            <div class="flex items-center">
                <a href="#" class="text-2xl font-bold text-accent">
                    LOGO
                </a>
            </div>

            <!-- Desktop Menu -->
            <div class="hidden md:flex space-x-8 items-center">
                <ul class="flex space-x-6">
                    <li><a href="index.html" class="hover:text-secondary transition duration-300">Home</a></li>
                    <li><a href="menu.html" class="hover:text-secondary transition duration-300">Menu</a></li>
                    <li><a href="custom-order.html" class="hover:text-secondary transition duration-300">Order</a></li>
                    <li><a href="#" class="hover:text-secondary transition duration-300">Contact</a></li>
                </ul>
                <button class="bg-secondary hover:bg-accent text-neutral px-6 py-2 rounded-full font-semibold transition duration-300">
                    <a href="login.html">Sign In</a>
                </button>
            </div>

            <!-- Mobile Menu Button -->
            <div class="md:hidden flex items-center">
                <button id="mobile-menu-button" class="text-neutral focus:outline-none">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path>
                    </svg>
                </button>
            </div>
        </nav>

        <!-- Mobile Menu (Hidden by default) -->
        <div id="mobile-menu" class="hidden md:hidden bg-primary border-t border-accent/20">
            <ul class="flex flex-col p-4 space-y-4">
                <li><a href="index.html" class="block hover:text-secondary transition duration-300">Home</a></li>
                <li><a href="menu.html" class="block hover:text-secondary transition duration-300">Menu</a></li>
                <li><a href="custom-order.html" class="block hover:text-secondary transition duration-300">Order</a></li>
                <li><a href="#" class="block hover:text-secondary transition duration-300">Contact</a></li>
                <li>
                    <button class="w-full bg-secondary hover:bg-accent text-neutral px-6 py-2 rounded-lg font-semibold transition duration-300">
                        <a href="login.html">Sign In</a>
                    </button>
                </li>
            </ul>
        </div>
    </header>
    <script>
        const btn = document.getElementById('mobile-menu-button');
        const menu = document.getElementById('mobile-menu');

        btn.addEventListener('click', () => {
            menu.classList.toggle('hidden');
        });
    </script>




    <div class="container-form" id="login">
    <form class="form-card"> 
            
            <h1 >SIGN IN</h1>
            <span class="input__card">username : <input type="text"></span>
            <span class="input__card">password : <input type="password"></span>
             <button class="btn">
                    Sign In
                </button>
                
                <a href="#" onclick="showRegister()"> not have account? register</a>
                
        </form>
   </div>

   <div class="container-form hidden" id="register">
    <form class="form-card"> 
            
            <h1 >REGISTER</h1>
            <span class="input__card">username : <input type="text"></span>
            <span class="input__card">password : <input type="password"></span>
            <span class="input__card">NAME : <input type="text"></span>
            <span class="input__card">Surname : <input type="text"></span>
            <span class="input__card">Email : <input type="email"></span>
            <span class="input__card">Birthday : <input type="date"> </span>

             <button class="btn"> Register </button>
                <a href="#" onclick="showLogin()"> alreeady have account? login</a>
        </form>
   </div>




</body>
</html>
