<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Page Title</title>
    <link rel='stylesheet' href='main.css'>
    <style type="text/tailwindcss">

        @layer components {
            body{
               @apply text-[#EEEEEE];
            }
            .card{
              @apply gap-2 flex flex-col justify-center items-center bg-[#DC5F00] border-2 border-solid w-[40%];
            }
            .btn{
               @apply  bg-[#CF0A0A] self-center mt-[10%]
            }

        }  



    </style>
</head>
<body>
<header>


</header>

    <div class="flex flex-row justify-center mt-[10%]  w-full gap-x-3.5"> 
        <div class="card bg-[#F5F0E8] "><img class="w-full h-auto" src="src/fired-chicken.jpg" alt="item-photo"/></div>
        <div class="card">
            <div class="h-[60%] pt-[10%]">
            <h1>Items Name</h1>
            <p>PRICE</p>
            <span>Quantity: <input class="bg-[#EEEEEE] text-black"  type="number" value="0" min="0" max="50" step="1"></span>
            <input class="w-[80%] self-center  bg-amber-50 h-[50%] overflow-scroll"  placeholder="NOTE" type="textarea" >
            </div>
            <button class="btn">ADD TO CART</button>
        </div>


    </div>
</body>
</html>
